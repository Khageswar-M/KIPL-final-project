<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Verify OTP · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
  <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- <div id="nc-navbar"></div> -->
  <section class="nc-auth">
    <div class="nc-auth-card">
      <div class="nc-brand-logo d-flex align-items-center">
        <img src="./images/AppLogo.png" alt="NovaCart Logo" class="img-fluid"
          style="height:45px; width:auto; scale: 4;">
      </div>
      <h1>Verify your email</h1>
      <p class="sub">We sent a 6-digit code to your inbox. <mark>Just fill it randomly.</mark></p>
      <form id="otpForm">
        <div class="nc-otp mb-3">
          <input type="number" maxlength="1" inputmode="numeric" required>
          <input type="number" maxlength="1" inputmode="numeric" required>
          <input type="number" maxlength="1" inputmode="numeric" required>
          <input type="number" maxlength="1" inputmode="numeric" required>
          <input type="number" maxlength="1" inputmode="numeric" required>
          <input type="number" maxlength="1" inputmode="numeric" required>
        </div>
        <p class="text-center text-muted-nc" style="font-size:13px">Resend code in <span id="cd">00:45</span></p>
        <button class="btn-nc w-100 justify-content-center" type="submit">Verify</button>
        <p class="text-center mt-3 mb-0"><a href="#"
            onclick="document.getElementById('cd').textContent='00:60';ncToast('Code resent');return false"
            class="text-primary-nc" style="font-size:14px">Resend OTP</a></p>
      </form>
      <script>
        let s = 45;
        const cd = document.getElementById('cd');
        const t = setInterval(() => {
          s--;
          if (s <= 0) {
            clearInterval(t);
            cd.textContent = '00:00'
          } else cd.textContent = '00:' + String(s).padStart(2, '0')
        }, 1000);
      </script>
    </div>
  </section>
  <!-- <div id="nc-footer"></div> -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Guard: this page only makes sense after Forgot Password sent an email.
    // if (!sessionStorage.getItem("nc_reset_email")) {
    //   location.href = "forgot-password.html";
    // }

    const otpBoxes = Array.from(document.querySelectorAll(".nc-otp input"));

    otpBoxes.forEach((box, i) => {
      box.addEventListener("input", () => {
        box.value = box.value.replace(/[^0-9]/g, "").slice(0, 1);
        if (box.value && i < otpBoxes.length - 1) {
          otpBoxes[i + 1].focus();
        }
      });

      box.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !box.value && i > 0) {
          otpBoxes[i - 1].focus();
        }
      });
    });

    document.getElementById("otpForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const allFilled = otpBoxes.every(box => box.checkValidity() && box.value !== "");
      if (!allFilled) {
        ncToast("Enter all 6 digits");
        otpBoxes.find(box => !box.value)?.focus();
        return;
      }

      // Prototype flow: any 6 digits are accepted, per the note above.
      // sessionStorage.setItem("nc_reset_verified", "true");
      location.href = "reset-password.html";
    });
  </script>
</body>

</html>

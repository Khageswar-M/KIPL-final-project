<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Addresses · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div id="nc-navbar"></div>

  <section class="py-5">
    <div class="container-nc">
      <div class="row g-4">
        <div class="col-lg-3">
          <div class="nc-side-nav"><a href="profile.html" class=""><span>👤</span>Profile</a><a href="edit-profile.html"
              class=""><span>✏️</span>Edit Profile</a><a href="orders.html" class=""><span>📦</span>My Orders</a><a
              href="wishlist.html" class=""><span>♡</span>Wishlist</a><a href="address.html"
              class="active"><span>📍</span>Addresses</a><a href="notifications.html"
              class=""><span>🔔</span>Notifications</a><a href="support.html" class=""><span>💬</span>Support</a><a
              href="login.html" class=""><span>↩</span>Logout</a></div>
        </div>
        <div class="col-lg-9">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="mb-0">Saved Addresses</h4><button class="btn-nc" data-bs-toggle="modal" data-bs-target="#addrM">+
              Add Address</button>
          </div>
          <div class="row g-3" id="addressList">
            <div class="col-md-6">
              <div class="nc-address default"><span class="tag">Default</span>
                <h6>🏠 Home</h6>
                <p class="text-muted-nc mb-1">Jane Doe · +1 555 123 456</p>
                <p class="text-muted-nc mb-3">221B Baker St, Apt 4<br>San Francisco, CA 94103</p>
                <div class="d-flex gap-2"><button class="btn-nc-ghost">Edit</button><button class="btn-nc-ghost"
                    onclick="ncToast('Address removed')">Delete</button></div>
              </div>
            </div>
            <div class="col-md-6">
              <div class="nc-address">
                <h6>🏢 Office</h6>
                <p class="text-muted-nc mb-1">Jane Doe · +1 555 987 654</p>
                <p class="text-muted-nc mb-3">1 Market St, Floor 20<br>San Francisco, CA 94105</p>
                <div class="d-flex gap-2"><button class="btn-nc-ghost">Edit</button><button class="btn-nc-ghost"
                    onclick="ncToast('Set as default')">Set default</button><button class="btn-nc-ghost">Delete</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <div class="modal fade" id="addrM">
    <div class="modal-dialog">
      <div class="modal-content bg-surface border-nc" style="background:var(--nc-surface);color:var(--nc-text)">
        <div class="modal-header border-0">
          <h5>Add Address</h5><button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="addrForm" onsubmit="handleAddressSubmit(event)" class="row g-2">
            <input type="hidden" id="addrId">

            <div class="col-12">
              <label class="nc-label">Label</label>
              <input class="nc-input" id="addrLabel" placeholder="Home / Office">
            </div>
            <div class="col-md-6">
              <label class="nc-label">Full name</label>
              <input class="nc-input" id="addrName">
            </div>
            <div class="col-md-6">
              <label class="nc-label">Phone</label>
              <input class="nc-input" id="addrPhone">
            </div>
            <div class="col-12">
              <label class="nc-label">Street</label>
              <input class="nc-input" id="addrStreet">
            </div>
            <div class="col-md-6">
              <label class="nc-label">City</label>
              <input class="nc-input" id="addrCity">
            </div>
            <div class="col-md-3">
              <label class="nc-label">State</label>
              <input class="nc-input" id="addrState">
            </div>
            <div class="col-md-3">
              <label class="nc-label">ZIP</label>
              <input class="nc-input" id="addrZip">
            </div>

            <div class="col-12 mt-2 d-flex align-items-center gap-2">
              <input type="checkbox" id="addrDefault">
              <label class="nc-label mb-0" for="addrDefault">Set as default address</label>
            </div>

            <div class="col-12 mt-3">
              <button class="btn-nc w-100 justify-content-center">Save Address</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/address.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Order Confirmed · NovaCart</title>

  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
  <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div id="nc-navbar"></div>

  <section class="py-5">
    <div class="container-nc" style="max-width:700px">

      <div class="bg-surface border-nc rounded-nc p-5 text-center" style="border-radius:24px;">

        <!-- Success Icon -->
        <div class="success-icon mx-auto mb-4">
          <i class="fa-solid fa-circle-check"></i>
        </div>

        <h1 class="fw-bold mb-2">
          Payment Successful!
        </h1>

        <p class="text-muted-nc mb-4">
          Thank you for shopping with <strong>NovaCart</strong>.
          Your payment has been received successfully and your order has been confirmed.
        </p>

        <!-- Details Card -->
        <div class="bg-surface-2 rounded-nc p-4 text-start">

          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted-nc">
              Order ID
            </span>

            <strong id="orderId"></strong>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted-nc">
              Amount Paid
            </span>

            <strong id="amountPaid"></strong>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted-nc">
              Payment Method
            </span>

            <strong id="paymentMethod"></strong>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted-nc">
              Card Holder
            </span>

            <strong id="cardHolder"></strong>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted-nc">
              Payment Date
            </span>

            <strong id="paymentDate"></strong>
          </div>

          <div class="d-flex justify-content-between align-items-center">
            <span class="text-muted-nc">
              Estimated Delivery
            </span>

            <strong id="deliveryDate"></strong>
          </div>

        </div>

        <div class="d-flex justify-content-center gap-3 flex-wrap mt-5">

          <a id="trackOrderBtn" class="btn-nc">
            <i class="fa-solid fa-box me-2"></i>
            Track Order
          </a>

          <button class="btn-nc-outline" onclick="downloadInvoice()">
            <i class="fa-solid fa-file-arrow-down me-2"></i>
            Download Invoice
          </button>

          <a href="home.html" class="btn-nc-ghost">
            Continue Shopping
          </a>

        </div>

      </div>

    </div>
  </section>

  <style>
    .success-icon {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: rgba(34, 197, 94, .12);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pop .6s ease;
    }

    .success-icon i {
      font-size: 70px;
      color: #22c55e;
    }

    @keyframes pop {
      0% {
        transform: scale(.3);
        opacity: 0;
      }

      70% {
        transform: scale(1.12);
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>

  <div id="nc-footer"></div>

  <script>

  // -----------------------------
  // Get Order ID from URL
  // -----------------------------
  const params = new URLSearchParams(window.location.search);
  const orderId = params.get("id");

  // -----------------------------
  // Load Orders
  // -----------------------------
  const orders = JSON.parse(localStorage.getItem("novacart_orders")) || [];

  const order = orders.find(o => o.id === orderId);

  if (!order) {
    alert("Order not found.");
    window.location.href = "home.html";
  }

  // -----------------------------
  // Format Currency
  // -----------------------------
  function formatCurrency(value) {
    return "₹" + Number(value || 0).toLocaleString("en-IN", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  // -----------------------------
  // Order ID
  // -----------------------------
  document.getElementById("orderId").textContent =
    "#" + order.id;

  // -----------------------------
  // Amount Paid
  // -----------------------------
  document.getElementById("amountPaid").textContent =
    formatCurrency(order.priceSummary.total);

  // -----------------------------
  // Payment Method
  // -----------------------------
  document.getElementById("paymentMethod").textContent =
    order.payment.detail;

  // -----------------------------
  // Card Holder
  // -----------------------------
  document.getElementById("cardHolder").textContent =
    order.payment.holder || "-";

  // -----------------------------
  // Payment Date
  // -----------------------------
  const paymentDate = new Date(order.placedAt);

  document.getElementById("paymentDate").textContent =
    paymentDate.toLocaleDateString("en-US", {
      month: "short",
      day: "numeric",
      year: "numeric"
    });

  // -----------------------------
  // Estimated Delivery (+3 days)
  // -----------------------------
  const deliveryDate = new Date(order.placedAt);

  deliveryDate.setDate(deliveryDate.getDate() + 3);

  document.getElementById("deliveryDate").textContent =
    deliveryDate.toLocaleDateString("en-US", {
      month: "short",
      day: "numeric",
      year: "numeric"
    });

  // -----------------------------
  // Track Order Button
  // -----------------------------
  document.getElementById("trackOrderBtn").href =
    `order-details.html?id=${order.id}`;

  // -----------------------------
  // Download Invoice
  // -----------------------------
  function downloadInvoice() {

    if (typeof ncToast === "function") {
      ncToast("Invoice download will be available soon.");
    } else {
      alert("Invoice download will be available soon.");
    }

  }

</script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/app.js"></script>

</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
    <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- <div id="nc-navbar"></div> -->
  <section class="nc-auth">
    <div class="nc-auth-card">
      <div class="nc-brand-logo d-flex align-items-center">
        <img src="./images/AppLogo.png" alt="NovaCart Logo" class="img-fluid"
          style="height:45px; width:auto; scale: 4;">
      </div>
      <h1>Welcome back 👋</h1>
      <p class="sub">Sign in to continue shopping.</p>
      <form id="loginForm">
        <div class="mb-3">
          <label class="nc-label">Mobile number</label>
          <input id="phone" type="tel" class="nc-input" placeholder="Your phone number" maxlength="10"
            oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)" required>
        </div>

        <div class="mb-2">
          <label class="nc-label d-flex justify-content-between">
            Password
            <button type="button" data-toggle-password="#pw"
              style="background:none;border:0;color:var(--nc-muted);font-size:12px">
              Show
            </button>
          </label>

          <input id="pw" type="password" class="nc-input" placeholder="••••••••" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
          <label class="nc-check"><input type="checkbox"> Remember me</label>
          <a href="reset-password.html" class="text-primary-nc" style="font-size:13px">Forgot password?</a>
        </div>
        <button class="btn-nc w-100 justify-content-center">Login</button>
        <p class="text-center mt-4 mb-0 text-muted-nc" style="font-size:14px">New here? <a href="signup.html"
            class="text-primary-nc">Create an account</a></p>
      </form>
    </div>
  </section>
  <!-- <div id="nc-footer"></div> -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const form = document.getElementById("loginForm");
      const phone = document.getElementById("phone");
      const password = document.getElementById("pw");

      form.addEventListener("submit", (e) => {

        e.preventDefault();

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        const user = JSON.parse(localStorage.getItem("user"));

        if (!user) {
          ncToast("No account found. Please sign up first.");
          return;
        }

        if (
          phone.value.trim() !== user.phone ||
          password.value !== user.password
        ) {
          ncToast("Invalid mobile number or password.");
          return;
        }

        ncToast("Login successful!");
        localStorage.setItem("login", JSON.stringify(true));

        setTimeout(() => {
          window.location.href = "index.html";
        }, 800);

      });

    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>

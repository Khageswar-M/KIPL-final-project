<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login · NovaCart</title>
<meta name="description" content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
<div id="nc-navbar"></div>
<section class="nc-auth"><div class="nc-auth-card">
<div class="nc-brand-logo"><span class="brand-dot" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--nc-gradient)"></span>NovaCart</div>
<h1>Welcome back 👋</h1><p class="sub">Sign in to continue shopping.</p>
<form onsubmit="event.preventDefault();location.href='home.html'">
  <div class="mb-3"><label class="nc-label">Email</label><input type="email" class="nc-input" placeholder="you@email.com" required></div>
  <div class="mb-2"><label class="nc-label d-flex justify-content-between">Password <button type="button" data-toggle-password="#pw" style="background:none;border:0;color:var(--nc-muted);font-size:12px">Show</button></label><input id="pw" type="password" class="nc-input" placeholder="••••••••" required></div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <label class="nc-check"><input type="checkbox"> Remember me</label>
    <a href="forgot-password.html" class="text-primary-nc" style="font-size:13px">Forgot password?</a>
  </div>
  <button class="btn-nc w-100 justify-content-center">Login</button>
  <div class="nc-divider">Or continue with</div>
  <div class="d-grid gap-2">
    <button type="button" class="nc-social-btn">🇬 Continue with Google</button>
    <button type="button" class="nc-social-btn">🐙 Continue with GitHub</button>
  </div>
  <p class="text-center mt-4 mb-0 text-muted-nc" style="font-size:14px">New here? <a href="signup.html" class="text-primary-nc">Create an account</a></p>
</form>
</div></section>
<div id="nc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profile · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
    <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div id="nc-navbar"></div>

  <section class="py-5">
    <div class="container-nc">
      <div class="row g-4">
        <div class="col-lg-3">
          <div class="nc-side-nav">
            <a href="profile.html" class="active">
              <i class="fa-solid fa-user me-2"></i>Profile
            </a>

            <a href="edit-profile.html">
              <i class="fa-solid fa-pen-to-square me-2"></i>Edit Profile
            </a>

            <a href="orders.html">
              <i class="fa-solid fa-box me-2"></i>My Orders
            </a>

            <a href="address.html">
              <i class="fa-solid fa-location-dot me-2"></i>Addresses
            </a>

            <a href="notifications.html">
              <i class="fa-solid fa-bell me-2"></i>Notifications
            </a>

            <a href="support.html">
              <i class="fa-solid fa-comments me-2"></i>Support
            </a>
          </div>
        </div>
        <div class="col-lg-9">
          <div class="nc-profile-card">
            <div class="av" id="nc-avatar">JD</div>
            <h3 class="mb-0" id="nc-fullname">Jane Doe</h3>
            <p class="mb-0" style="opacity:.9">
              <span id="nc-email">jane.doe@email.com</span> · <span id="nc-membership">Member</span>
            </p>
            <div class="row g-3 mt-3">
              <div class="col-md-3 col-6">
                <div style="background:rgba(255,255,255,.15);padding:14px;border-radius:12px"><small>Orders</small>
                  <h4 class="mb-0 mt-1" id="nc-stat-orders">0</h4>
                </div>
              </div>
              <div class="col-md-3 col-6">
                <div style="background:rgba(255,255,255,.15);padding:14px;border-radius:12px"><small>Wishlist</small>
                  <h4 class="mb-0 mt-1" id="nc-stat-wishlist">0</h4>
                </div>
              </div>
              <div class="col-md-3 col-6">
                <div style="background:rgba(255,255,255,.15);padding:14px;border-radius:12px"><small>Addresses</small>
                  <h4 class="mb-0 mt-1" id="nc-stat-addresses">0</h4>
                </div>
              </div>
              <div class="col-md-3 col-6">
                <div style="background:rgba(255,255,255,.15);padding:14px;border-radius:12px"><small>Rewards</small>
                  <h4 class="mb-0 mt-1" id="nc-stat-rewards">0</h4>
                </div>
              </div>
            </div>
          </div>

          <div class="row g-3 mt-3">
            <div class="col-md-6">
              <div class="p-4 bg-surface rounded-nc border-nc">
                <h6 class="text-uppercase text-muted-nc" style="font-size:11px;letter-spacing:1px">Account Info</h6>
                <div class="mt-2">
                  <div class="text-muted-nc" style="font-size:13px">Phone</div>
                  <div id="nc-phone">—</div>
                </div>
                <div class="mt-2">
                  <div class="text-muted-nc" style="font-size:13px">Member since</div>
                  <div id="nc-member-since">—</div>
                </div>
                <a href="edit-profile.html" class="btn-nc-outline mt-3">Edit Profile</a>
              </div>
            </div>
            <div class="col-md-6">
              <div class="p-4 bg-surface rounded-nc border-nc h-100">
                <h6 class="text-uppercase text-muted-nc" style="font-size:11px;letter-spacing:1px">Quick Actions</h6>
                <div class="d-grid gap-2 mt-2">
                  <a href="orders.html" class="btn-nc-ghost text-start"><i class="fa-solid fa-box-open me-2"></i> Track my orders</a>
                  <a href="address.html" class="btn-nc-ghost text-start"><i class="fa-solid fa-location-dot me-2"></i> Manage addresses</a>
                  <a href="support.html" class="btn-nc-ghost text-start"><i class="fa-solid fa-headset me-2"></i> Get support</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      // Dummy fallbacks used only for fields the stored user object doesn't have
      var fallback = {
        fullName: "Jane Doe",
        email: "jane.doe@email.com",
        phone: "+1 555 123 4567",
        profilePic: "",
        createdAt: new Date().toISOString()
      };

      var dummyStats = { orders: 12, wishlist: 8, addresses: 2, rewards: 2450 };

      function loadUser() {
        // Adjust the key below if your app stores the logged-in user under a different name
        var keys = ["novacart_user", "ncUser", "user"];
        for (var i = 0; i < keys.length; i++) {
          var raw = localStorage.getItem(keys[i]);
          if (raw) {
            try {
              return JSON.parse(raw);
            } catch (e) { /* ignore bad JSON, keep looking */ }
          }
        }
        return null;
      }

      function initials(name) {
        return name
          .split(" ")
          .filter(Boolean)
          .map(function (w) { return w[0].toUpperCase(); })
          .slice(0, 2)
          .join("") || "U";
      }

      function formatMemberSince(dateStr) {
        var d = new Date(dateStr);
        if (isNaN(d.getTime())) return "—";
        return d.toLocaleDateString("en-US", { month: "short", year: "numeric" });
      }

      var stored = loadUser() || {};
      var data = Object.assign({}, fallback, stored);

      var avatarEl = document.getElementById("nc-avatar");
      if (data.profilePic) {
        avatarEl.innerHTML = '<img src="' + data.profilePic + '" alt="' + data.fullName +
          '" style="width:100%;height:100%;object-fit:cover;border-radius:50%">';
      } else {
        avatarEl.textContent = initials(data.fullName);
      }

      document.getElementById("nc-fullname").textContent = data.fullName;
      document.getElementById("nc-email").textContent = data.email;
      document.getElementById("nc-phone").textContent = data.phone;
      document.getElementById("nc-member-since").textContent = formatMemberSince(data.createdAt);
      document.getElementById("nc-membership").textContent = data.membership || "Premium Member";

      // Orders/Wishlist/Addresses/Rewards aren't in the stored user object yet,
      // so these fall back to dummy numbers until that data exists somewhere (e.g. its own localStorage key).
      var stats = Object.assign({}, dummyStats, {
        orders: stored.ordersCount,
        wishlist: stored.wishlistCount,
        addresses: stored.addressesCount,
        rewards: stored.rewardsPoints
      });
      document.getElementById("nc-stat-orders").textContent = stats.orders != null ? stats.orders : dummyStats.orders;
      document.getElementById("nc-stat-wishlist").textContent = stats.wishlist != null ? stats.wishlist : dummyStats.wishlist;
      document.getElementById("nc-stat-addresses").textContent = stats.addresses != null ? stats.addresses : dummyStats.addresses;
      document.getElementById("nc-stat-rewards").textContent = stats.rewards != null ? stats.rewards : dummyStats.rewards;
    })();
  </script>
</body>

</html>

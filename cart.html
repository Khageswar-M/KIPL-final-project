<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cart · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div id="nc-navbar"></div>

  <div class="container-nc nc-crumb"><a href="home.html">Home</a><span class="sep">/</span>Cart</div>
  <section class="pb-5">
    <div class="container-nc">
      <div class="row g-4">
        <div class="col-lg-8">
          <h2 id="totalCartItem">Your Cart (3)</h2>
          <div id="cartItems" class="row"></div>
          <a href="products.html" class="btn-nc-outline mt-3">← Continue Shopping</a>
        </div>
        <div class="col-lg-4">
          <div class="nc-summary">
            <h5>Price Summary</h5>
            <div class="row">
              <span id="totalItems">Subtotal (3)</span>
            </div>
            <div class="row">
              <span>Shipping (0.03%)</span>
              <span class=" ms-auto" id="shippingCharge">Free</span>
            </div>
            <div class="row">
              <span>Tax (est. 0.05%)</span>
              <span class=" ms-auto" id="taxCharge">Free</span>
            </div>
            <div class="row">
              <span>Discount (0.01%)</span>
              <span style="color:var(--nc-accent)" class="ms-auto" id="discountAmount">−$40.00</span>
            </div>
            <div class="row total">
              <span>Total</span>
              <span class="ms-auto" id="totalAmount">₹00.00</span>
            </div>
            <div class="mt-3">
              <label class="nc-label">Coupon</label>
              <div class="d-flex gap-2">
                <input class="nc-input" placeholder="NOVA20">
                <button class="btn-nc-ghost">
                  Apply
                </button>
              </div>
            </div>
            <a id="checkoutBtn" class="btn-nc w-100 justify-content-center mt-3">Checkout →</a>
          </div>
        </div>
      </div>

      <div class="nc-section-head mt-5">
        <h2>You may also like</h2>
      </div>
      <div class="row g-3" id="pgrid"></div>
    </div>
  </section>
  

  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cart · NovaCart</title>
<meta name="description" content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
<div id="nc-navbar"></div>

<div class="container-nc nc-crumb"><a href="home.html">Home</a><span class="sep">/</span>Cart</div>
<section class="pb-5"><div class="container-nc"><div class="row g-4">
  <div class="col-lg-8">
    <h2>Your Cart (3)</h2>
    <div id="cartItems"></div>
    <a href="products.html" class="btn-nc-outline mt-3">← Continue Shopping</a>
  </div>
  <div class="col-lg-4">
    <div class="nc-summary">
      <h5>Price Summary</h5>
      <div class="row"><span>Subtotal (3)</span><span class=" ms-auto">$457.00</span></div>
      <div class="row"><span>Shipping</span><span class=" ms-auto">Free</span></div>
      <div class="row"><span>Tax (est.)</span><span class=" ms-auto">$36.56</span></div>
      <div class="row"><span>Discount</span><span style="color:var(--nc-accent)" class="ms-auto">−$40.00</span></div>
      <div class="row total"><span>Total</span><span class="ms-auto">$453.56</span></div>
      <div class="mt-3"><label class="nc-label">Coupon</label><div class="d-flex gap-2"><input class="nc-input" placeholder="NOVA20"><button class="btn-nc-ghost">Apply</button></div></div>
      <a href="checkout.html" class="btn-nc w-100 justify-content-center mt-3">Checkout →</a>
    </div>
  </div>
</div>

<div class="nc-section-head mt-5"><h2>You may also like</h2></div>
<div class="row g-3" id="pgrid"></div>
</div></section>
<script>document.addEventListener('DOMContentLoaded',()=>{
  const items=NovaCart.products.slice(0,3);
  document.getElementById('cartItems').innerHTML = items.map(p=>`
    <div class="nc-cart-row">
      <div class="im">${p.emoji}</div>
      <div><div class="text-muted-nc" style="font-size:11px;text-transform:uppercase">${p.brand}</div><div style="font-weight:600">${p.title}</div>
        <div class="d-flex align-items-center gap-3 mt-2 flex-wrap">
          <div class="nc-qty"><button onclick="const i=this.nextElementSibling;i.value=Math.max(1,+i.value-1)">−</button><input value="1"><button onclick="const i=this.previousElementSibling;i.value=+i.value+1">+</button></div>
          <a href="#" class="text-muted-nc" style="font-size:13px" onclick="ncToast('Saved for later');return false">Save for later</a>
          <a href="#" class="text-muted-nc" style="font-size:13px" onclick="this.closest('.nc-cart-row').remove();return false">Remove</a>
        </div></div>
      <div class="text-end"><div style="font-weight:700;font-size:18px">${p.price}</div><small class="text-muted-nc" style="text-decoration:line-through">${p.old}</small></div>
    </div>`).join('');
  document.getElementById('pgrid').innerHTML = NovaCart.products.slice(6,10).map(p=>`<div class="col-6 col-md-4 col-lg-3">${productCard(p)}</div>`).join('');
});</script>

<div id="nc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign up · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
    <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- <div id="nc-navbar"></div> -->
  <section class="nc-auth">
    <div class="nc-auth-card">
      <div class="nc-brand-logo d-flex align-items-center">
        <img src="./images/AppLogo.png" alt="NovaCart Logo" class="img-fluid"
          style="height:45px; width:auto; scale: 4;">
      </div>
      <h1>Create your account</h1>
      <p class="sub">Start shopping in seconds.</p>
      <form id="signupForm">
        <div class="row g-2">
          <div class="col-12">
            <label class="nc-label">Full name</label>
            <input id="fullName" class="nc-input" placeholder="Jane Doe" required>
          </div>

          <div class="col-12">
            <label class="nc-label">Mobile number</label>
            <input id="phone" type="tel" class="nc-input" placeholder="9876543210" maxlength="10"
              oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)" required>
          </div>

          <div class="col-12">
            <label class="nc-label">Password</label>
            <div style="position:relative">
              <input id="password" type="password" class="nc-input" placeholder="Create a strong password"
                autocomplete="new-password" required style="padding-right:42px">
              <button type="button" id="togglePw"
                style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--nc-text-muted,#888);cursor:pointer">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <div style="height:4px;background:var(--nc-surface-2);border-radius:2px;overflow:hidden;margin-top:8px">
              <div id="str" style="height:100%;width:0;transition:.2s;background:#e63946"></div>
            </div>
            <div id="pwHint" style="font-size:12px;margin-top:6px;color:var(--nc-text-muted,#888)">
              Use 8+ characters with uppercase, lowercase, a number and a symbol.
            </div>
          </div>
        </div>
        <label class="nc-check mt-3">
          <input type="checkbox" required> I agree to the <a href="#" class="text-primary-nc">Terms</a> & <a href="#"
            class="text-primary-nc">Privacy Policy</a></label>
        <button id="submitBtn" class="btn-nc w-100 justify-content-center mt-3" disabled>Create Account</button>
        <p class="text-center mt-4 mb-0 text-muted-nc" style="font-size:14px">Already have an account? <a
            href="login.html" class="text-primary-nc">Login</a></p>
      </form>
    </div>
  </section>
  <!-- <div id="nc-footer"></div> -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const form = document.getElementById("signupForm");
      const pwInput = document.getElementById("password");
      const strBar = document.getElementById("str");
      const submitBtn = document.getElementById("submitBtn");
      const togglePw = document.getElementById("togglePw");

      let currentStrength = "weak"; // weak | medium | strong

      function evaluatePassword(pw) {
        let score = 0;
        if (pw.length >= 8) score++;
        if (/[a-z]/.test(pw)) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;

        if (pw.length < 8 || score <= 2) return { level: "weak", pct: 33, color: "#e63946" };
        if (score <= 4) return { level: "medium", pct: 66, color: "#f4a261" };
        return { level: "strong", pct: 100, color: "#2a9d5c" };
      }

      pwInput.addEventListener("input", () => {
        const { level, pct, color } = evaluatePassword(pwInput.value);
        currentStrength = level;
        strBar.style.width = pct + "%";
        strBar.style.background = color;
        submitBtn.disabled = level !== "strong";
      });

      togglePw.addEventListener("click", () => {
        const isPw = pwInput.type === "password";
        pwInput.type = isPw ? "text" : "password";
        togglePw.innerHTML = isPw
          ? '<i class="fa-regular fa-eye-slash"></i>'
          : '<i class="fa-regular fa-eye"></i>';
      });

      form.addEventListener("submit", (e) => {

        e.preventDefault();

        const fullName = document.getElementById("fullName").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const password = pwInput.value;

        if (currentStrength !== "strong") {
          ncToast("Please create a stronger password before continuing");
          return;
        }

        let user = JSON.parse(localStorage.getItem("user"));

        if (user && user.phone === phone) {
          ncToast("Mobile number already registered");
          return;
        }

        user = {
          fullName,
          phone,
          password,
          createdAt: new Date().toISOString()
        };

        localStorage.setItem("user", JSON.stringify(user));

        ncToast("Account created successfully!");

        window.location.href = "login.html";

      });

    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>

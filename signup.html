<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign up · NovaCart</title>
<meta name="description" content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
<div id="nc-navbar"></div>
<section class="nc-auth"><div class="nc-auth-card">
<div class="nc-brand-logo"><span class="brand-dot" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--nc-gradient)"></span>NovaCart</div>
<h1>Create your account</h1><p class="sub">Start shopping in seconds.</p>
<form onsubmit="event.preventDefault();location.href='verify-otp.html'">
  <div class="row g-2">
    <div class="col-12"><label class="nc-label">Full name</label><input class="nc-input" placeholder="Jane Doe" required></div>
    <div class="col-md-7"><label class="nc-label">Email</label><input type="email" class="nc-input" placeholder="you@email.com" required></div>
    <div class="col-md-5"><label class="nc-label">Phone</label><input type="tel" class="nc-input" placeholder="+1..." required></div>
    <div class="col-md-6"><label class="nc-label d-flex justify-content-between">Password <button type="button" data-toggle-password="#pw" style="background:none;border:0;color:var(--nc-muted);font-size:12px">Show</button></label><input id="pw" type="password" class="nc-input" required oninput="const s=document.getElementById('str');const v=this.value.length;s.style.width=Math.min(v*10,100)+'%';s.style.background=v<6?'#ff4d6d':v<10?'#ffd166':'#38e8c6'"></div>
    <div class="col-md-6"><label class="nc-label">Confirm password</label><input type="password" class="nc-input" required></div>
    <div class="col-12"><div style="height:4px;background:var(--nc-surface-2);border-radius:2px;overflow:hidden"><div id="str" style="height:100%;width:0;transition:.2s"></div></div></div>
    <div class="col-12"><label class="nc-label">Profile picture (optional)</label><input type="file" class="nc-input" accept="image/*"></div>
  </div>
  <label class="nc-check mt-3"><input type="checkbox" required> I agree to the <a href="#" class="text-primary-nc">Terms</a> & <a href="#" class="text-primary-nc">Privacy Policy</a></label>
  <button class="btn-nc w-100 justify-content-center mt-3">Create Account</button>
  <p class="text-center mt-4 mb-0 text-muted-nc" style="font-size:14px">Already have an account? <a href="login.html" class="text-primary-nc">Login</a></p>
</form>
</div></section>
<div id="nc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>

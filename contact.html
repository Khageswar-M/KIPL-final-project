<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact · NovaCart</title>
<meta name="description" content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
<div id="nc-navbar"></div>

<section class="nc-hero" style="padding:70px 0">
  <div class="container-nc text-center">
    <span class="nc-hero-eyebrow">We're listening</span>
    <h1>Get in <span class="gradient-text">touch</span></h1>
    <p class="lead mx-auto">Questions, partnerships, feedback — send it our way.</p>
  </div>
</section>

<section class="pb-5"><div class="container-nc"><div class="row g-4">
  <div class="col-lg-4">
    <div class="p-4 bg-surface rounded-nc border-nc"><div class="ic" style="width:48px;height:48px;background:var(--nc-gradient);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px">📍</div>
      <h5 class="mt-3">Head Office</h5><p class="text-muted-nc mb-0">1 Market Street<br>San Francisco, CA 94105</p></div>
    <div class="p-4 bg-surface rounded-nc border-nc mt-3"><div class="ic" style="width:48px;height:48px;background:var(--nc-gradient);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px">📞</div>
      <h5 class="mt-3">Phone</h5><p class="text-muted-nc mb-0">+1 (800) NOVA-CART<br>Mon–Sun · 24/7</p></div>
    <div class="p-4 bg-surface rounded-nc border-nc mt-3"><div class="ic" style="width:48px;height:48px;background:var(--nc-gradient);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px">✉️</div>
      <h5 class="mt-3">Email</h5><p class="text-muted-nc mb-0">hello@novacart.io<br>support@novacart.io</p></div>
  </div>
  <div class="col-lg-8">
    <div class="p-4 bg-surface rounded-nc border-nc">
      <h4>Send us a message</h4>
      <form class="row g-3 mt-1" onsubmit="event.preventDefault();ncToast('Message sent!')">
        <div class="col-md-6"><label class="nc-label">Name</label><input class="nc-input" required></div>
        <div class="col-md-6"><label class="nc-label">Email</label><input type="email" class="nc-input" required></div>
        <div class="col-12"><label class="nc-label">Subject</label><input class="nc-input" required></div>
        <div class="col-12"><label class="nc-label">Message</label><textarea class="nc-input" rows="5" required></textarea></div>
        <div class="col-12"><button class="btn-nc">Send Message ✉️</button></div>
      </form>
    </div>
    <div class="mt-3 bg-surface rounded-nc border-nc overflow-hidden">
      <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=-122.406%2C37.786%2C-122.390%2C37.796&layer=mapnik" style="width:100%;height:280px;border:0;filter:invert(.9) hue-rotate(180deg)"></iframe>
    </div>
    <div class="d-flex gap-2 mt-3 flex-wrap">
      <a href="#" class="btn-nc-ghost">𝕏 Twitter</a><a href="#" class="btn-nc-ghost">📘 Facebook</a><a href="#" class="btn-nc-ghost">📷 Instagram</a><a href="#" class="btn-nc-ghost">💼 LinkedIn</a>
    </div>
  </div>
</div></div></section>

<div id="nc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>

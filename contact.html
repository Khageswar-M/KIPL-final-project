<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
  <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div id="nc-navbar"></div>

  <section class="nc-hero reveal" style="padding:70px 0">
    <div class="container-nc text-center">
      <span class="nc-hero-eyebrow">We're listening</span>
      <h1>Get in <span class="gradient-text">touch</span></h1>
      <p class="lead mx-auto">Questions, partnerships, feedback — send it our way.</p>
    </div>
  </section>

  <section class="pb-5">
    <div class="container-nc">
      <div class="row g-4">
        <div class="col-lg-4 reveal">
          <div class="p-4 bg-surface rounded-nc border-nc">
            <div class="ic"
              style="width:48px;height:48px;background:var(--nc-gradient);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color: aliceblue;">
              <i class="fa-solid fa-location-dot"></i>
            </div>
            <h5 class="mt-3">Head Office</h5>
            <p class="text-muted-nc mb-0">1 Market Street<br>India, Odisha, Bhubaneswar</p>
          </div>
          <div class="p-4 bg-surface rounded-nc border-nc mt-3">
            <div class="ic"
              style="width:48px;height:48px;background:var(--nc-gradient);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color: aliceblue;">
              <i class="fa-solid fa-phone"></i>
            </div>
            <h5 class="mt-3">Phone</h5>
            <p class="text-muted-nc mb-0">+91 8888888888 NOVA-CART<br>Mon–Sun · 24/7</p>
          </div>
          <div class="p-4 bg-surface rounded-nc border-nc mt-3">
            <div class="ic"
              style="width:48px;height:48px;background:var(--nc-gradient);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color: aliceblue;">
              <i class="fa-solid fa-envelope"></i>
            </div>
            <h5 class="mt-3">Email</h5>
            <p class="text-muted-nc mb-0">hello@novacart.io<br>support@novacart.io</p>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="p-4 bg-surface rounded-nc border-nc reveal">
            <h4>Send us a message</h4>
            <form class="row g-3 mt-1" onsubmit="event.preventDefault();ncToast('Message sent!')">
              <div class="col-md-6">
                <label class="nc-label">Name</label>
                <input class="nc-input" placeholder="Enter your name" required>
              </div>

              <div class="col-md-6">
                <label class="nc-label">Email</label>
                <input type="email" placeholder="Enter your email" class="nc-input" required>
              </div>

              <div class="col-12">
                <label class="nc-label">Subject</label>
                <input class="nc-input" placeholder="Enter your subject" required>
              </div>
              <div class="col-12">
                <label class="nc-label">Message</label>
                <textarea class="nc-input" placeholder="Enter your message" rows="5" required>
                </textarea>
              </div>
              <div class="col-12">
                <button class="btn-nc">Send Message <i class="fa-solid fa-envelope"></i>
                </button>
              </div>
            </form>
          </div>
          <div class="mt-3 bg-surface rounded-nc border-nc overflow-hidden reveal">

            <iframe class="w-100 d-block border-0" style="height:350px;"
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2935.9808493522037!2d85.696111209567!3d20.15196868120887!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3a19ae9140000001%3A0x870fb4bdd989d61d!2sSri%20Jagannath%20Temple!5e1!3m2!1sen!2sin!4v1784626969294!5m2!1sen!2sin"
              allowfullscreen loading="lazy" referrerpolicy="strict-origin-when-cross-origin">
            </iframe>

          </div>
          <div class="d-flex gap-2 mt-3 flex-wrap reveal">
            <a href="https://www.x.com" target="_blank" class="btn-nc-ghost"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="https://www.facebook.com" target="_blank" class="btn-nc-ghost"><i
                class="fa-brands fa-facebook-f"></i></a>
            <a href="https://www.instagram.com" target="_blank" class="btn-nc-ghost"><i
                class="fa-brands fa-instagram"></i></a>
            <a href="https://www.linkedin.com" target="_blank" class="btn-nc-ghost"> <i
                class="fa-brands fa-linkedin-in"></i></a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("active");
          }
        });
      }, {
        threshold: 0.15
      });

      document.querySelectorAll(".reveal").forEach(el => {
        observer.observe(el);
      });
    });
  </script>

  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>

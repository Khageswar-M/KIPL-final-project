<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forgot password · NovaCart</title>
<meta name="description" content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
<div id="nc-navbar"></div>
<section class="nc-auth"><div class="nc-auth-card">
<div class="nc-brand-logo"><span class="brand-dot" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--nc-gradient)"></span>NovaCart</div>
<h1>Forgot password?</h1><p class="sub">Enter your email and we'll send you a one-time code.</p>
<form onsubmit="event.preventDefault();location.href='verify-otp.html'">
  <label class="nc-label">Email</label>
  <input type="email" class="nc-input" placeholder="you@email.com" required>
  <button class="btn-nc w-100 justify-content-center mt-3">Send OTP</button>
  <p class="text-center mt-4 mb-0"><a href="login.html" class="text-primary-nc" style="font-size:14px">← Back to login</a></p>
</form>
</div></section>
<div id="nc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>

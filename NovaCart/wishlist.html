<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wishlist · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div id="nc-navbar"></div>

  <div class="container-nc nc-crumb"><a href="home.html">Home</a><span class="sep">/</span>Wishlist</div>
  <section class="pb-5">
    <div class="container-nc">
      <div class="d-flex justify-content-between flex-wrap gap-2 mb-4">
        <h2 class="mb-0">My Wishlist (8)</h2><button class="btn-nc-ghost" onclick="ncToast('Wishlist link copied')">🔗
          Share</button>
      </div>
      <div class="row g-3" id="pgrid"></div>
      <div class="nc-section-head mt-5">
        <h2>You may also like</h2>
      </div>
      <div class="row g-3" id="pgrid2"></div>
    </div>
  </section>
  <script>document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('pgrid').innerHTML = NovaCart.products.slice(0, 8).map(p => `<div class="col-6 col-md-4 col-lg-3">${productCard(p)}</div>`).join('');
      document.getElementById('pgrid2').innerHTML = NovaCart.products.slice(8, 12).map(p => `<div class="col-6 col-md-4 col-lg-3">${productCard(p)}</div>`).join('');
    });</script>

  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Categories · NovaCart</title>
<meta name="description" content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
<div id="nc-navbar"></div>

<div class="container-nc nc-crumb"><a href="home.html">Home</a><span class="sep">/</span>Categories</div>
<section class="pb-5"><div class="container-nc">
  <div class="nc-hero" style="padding:40px;border-radius:24px;background:linear-gradient(135deg,#1a2236,#0b0f1a);border:1px solid var(--nc-border);overflow:hidden">
    <div class="position-relative" style="z-index:2">
      <span class="nc-hero-eyebrow">Explore</span>
      <h1 style="font-size:44px">Shop by <span class="gradient-text">Category</span></h1>
      <p class="text-muted-nc">Browse curated collections across every lifestyle need.</p>
    </div>
  </div>
  <div class="row g-3 mt-4" id="catGrid"></div>

  <div class="nc-section-head mt-5"><h2>Featured in Electronics</h2></div>
  <div class="row g-3" id="pgrid"></div>
</div></section>
<script>document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('catGrid').innerHTML = NovaCart.categories.map(c=>`<div class="col-6 col-md-4 col-lg-3"><a href="products.html"><div class="nc-cat"><div class="emoji">${c.emoji}</div><h5>${c.name}</h5><p>${c.count} products</p></div></a></div>`).join('');
  document.getElementById('pgrid').innerHTML = NovaCart.products.slice(0,8).map(p=>`<div class="col-6 col-md-4 col-lg-3">${productCard(p)}</div>`).join('');
});</script>

<div id="nc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>

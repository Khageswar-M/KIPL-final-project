<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reset password · NovaCart</title>
<meta name="description" content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
<div id="nc-navbar"></div>
<section class="nc-auth"><div class="nc-auth-card">
<div class="nc-brand-logo"><span class="brand-dot" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--nc-gradient)"></span>NovaCart</div>
<h1>Set a new password</h1><p class="sub">Make it strong and memorable.</p>
<form onsubmit="event.preventDefault();ncToast('Password updated');setTimeout(()=>location.href='login.html',800)">
  <label class="nc-label">New password</label>
  <input id="pw" type="password" class="nc-input" required oninput="const s=document.getElementById('str');const v=this.value.length;s.style.width=Math.min(v*10,100)+'%';s.style.background=v<6?'#ff4d6d':v<10?'#ffd166':'#38e8c6'">
  <div class="mt-2" style="height:4px;background:var(--nc-surface-2);border-radius:2px;overflow:hidden"><div id="str" style="height:100%;width:0;transition:.2s"></div></div>
  <label class="nc-label mt-3">Confirm password</label>
  <input type="password" class="nc-input" required>
  <button class="btn-nc w-100 justify-content-center mt-3">Reset Password</button>
</form>
</div></section>
<div id="nc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>

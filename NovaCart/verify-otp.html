<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verify OTP · NovaCart</title>
<meta name="description" content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>
<div id="nc-navbar"></div>
<section class="nc-auth"><div class="nc-auth-card">
<div class="nc-brand-logo"><span class="brand-dot" style="display:inline-block;width:12px;height:12px;border-radius:50%;background:var(--nc-gradient)"></span>NovaCart</div>
<h1>Verify your email</h1><p class="sub">We sent a 6-digit code to your inbox.</p>
<form onsubmit="event.preventDefault();location.href='reset-password.html'">
  <div class="nc-otp mb-3">
    <input maxlength="1" inputmode="numeric"><input maxlength="1" inputmode="numeric"><input maxlength="1" inputmode="numeric"><input maxlength="1" inputmode="numeric"><input maxlength="1" inputmode="numeric"><input maxlength="1" inputmode="numeric">
  </div>
  <p class="text-center text-muted-nc" style="font-size:13px">Resend code in <span id="cd">00:45</span></p>
  <button class="btn-nc w-100 justify-content-center">Verify</button>
  <p class="text-center mt-3 mb-0"><a href="#" onclick="document.getElementById('cd').textContent='00:60';ncToast('Code resent');return false" class="text-primary-nc" style="font-size:14px">Resend OTP</a></p>
</form>
<script>
let s=45;const cd=document.getElementById('cd');const t=setInterval(()=>{s--;if(s<=0){clearInterval(t);cd.textContent='00:00'}else cd.textContent='00:'+String(s).padStart(2,'0')},1000);
</script>
</div></section>
<div id="nc-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>

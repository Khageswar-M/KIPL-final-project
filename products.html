<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shop · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
    <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    @keyframes nc-shimmer {
      0% { background-position: -450px 0; }
      100% { background-position: 450px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg, #e7e7e9 25%, #f2f2f4 37%, #e7e7e9 63%);
      background-size: 400% 100%;
      animation: nc-shimmer 1.4s ease infinite;
      border-radius: 6px;
    }

    .skeleton-checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .skeleton-checkbox-row .skeleton:first-child {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .skeleton-checkbox-row .skeleton:last-child {
      height: 12px;
      flex: 1;
    }

    .skeleton-card {
      height: 0;
      padding-bottom: 130%;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
    }

    .nc-price-range:disabled {
      opacity: 0.4;
    }
  </style>
</head>

<body>
  <div id="nc-navbar"></div>

  <section class="pb-5 pt-5">
    <div class="container-nc ">
      <div class="row g-4">

        <!-- FILTER -->
        <div class="col-lg-3">
          <div class="nc-filter">
            <!-- CATEGORY -->
            <div class="grp   ">
              <h6>Category</h6>
              <div id="categoriesListWithAllAvailableProducts" class="overflow-y-auto pe-2" style="max-height: 220px;">
                <div class="skeleton-checkbox-row"><span class="skeleton"></span><span class="skeleton" style="width:70%;"></span></div>
                <div class="skeleton-checkbox-row"><span class="skeleton"></span><span class="skeleton" style="width:55%;"></span></div>
                <div class="skeleton-checkbox-row"><span class="skeleton"></span><span class="skeleton" style="width:65%;"></span></div>
                <div class="skeleton-checkbox-row"><span class="skeleton"></span><span class="skeleton" style="width:45%;"></span></div>
              </div>
            </div>

            <!-- BRAND -->
            <div class="grp   ">
              <h6>Brand</h6>
              <div id="brandsList" class="overflow-y-auto pe-2" style="max-height: 220px;">
                <div class="skeleton-checkbox-row"><span class="skeleton"></span><span class="skeleton" style="width:60%;"></span></div>
                <div class="skeleton-checkbox-row"><span class="skeleton"></span><span class="skeleton" style="width:75%;"></span></div>
                <div class="skeleton-checkbox-row"><span class="skeleton"></span><span class="skeleton" style="width:50%;"></span></div>
              </div>
            </div>

            <!-- PRICE -->
            <div class="grp   ">
              <h6>Price</h6>
              <div id="priceUnder"><span class="skeleton" style="display:inline-block;width:110px;height:12px;"></span></div>
              <input id="rangeInput" type="range" min="0" max="1000" value="500" class="nc-price-range" disabled>
              <div id="priceRange" class="d-flex justify-content-between text-muted-nc mt-2" style="font-size:12px">
                <span class="skeleton" style="width:40px;height:11px;"></span>
                <span class="skeleton" style="width:40px;height:11px;"></span>
              </div>
            </div>

            <!-- RATTING -->
            <div class="grp   ">
              <h6>Rating</h6>
              <label class="nc-check"><input type="checkbox" data-value="5" class="rating-check"> ★★★★★ &amp; up</label>
              <label class="nc-check"><input type="checkbox" data-value="4" class="rating-check"> ★★★★ &amp; up</label>
              <label class="nc-check"><input type="checkbox" data-value="3" class="rating-check"> ★★★ &amp; up</label>
            </div>

            <!-- DISCOUNT -->
            <div class="grp   ">
              <h6>Discount</h6>
              <label class="nc-check"><input type="checkbox" data-value="10" class="discount-check"> 10% or more</label>
              <label class="nc-check"><input type="checkbox" data-value="25" class="discount-check"> 25% or more</label>
              <label class="nc-check"><input type="checkbox" data-value="50" class="discount-check"> 50% or more</label>
            </div>

          </div>
        </div>

        <div class="col-lg-9   ">
          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">

            <!-- SORTED-BY -->
            <div class="d-flex gap-2 align-items-center">
              <span class="text-muted-nc" style="font-size:13px">Sort by:</span>
              <select id="sortSelect" class="nc-input" style="width:auto">
                <option>Popularity</option>
                <option>Newest</option>
                <option>Price ↑</option>
                <option>Price ↓</option>
                <option>Rating</option>
              </select>
            </div>

          </div>

          <!-- CATEGORY LIST -->
          <div id="currentCategoryList" class="mb-3 d-flex gap-2 flex-wrap"></div>

          <!-- PRODUCTS -->
          <div class="row g-3" id="pgrid">
            <div class="col-6 col-md-4 col-lg-3"><div class="skeleton skeleton-card"></div></div>
            <div class="col-6 col-md-4 col-lg-3"><div class="skeleton skeleton-card"></div></div>
            <div class="col-6 col-md-4 col-lg-3"><div class="skeleton skeleton-card"></div></div>
            <div class="col-6 col-md-4 col-lg-3"><div class="skeleton skeleton-card"></div></div>
            <div class="col-6 col-md-4 col-lg-3"><div class="skeleton skeleton-card"></div></div>
            <div class="col-6 col-md-4 col-lg-3"><div class="skeleton skeleton-card"></div></div>
            <div class="col-6 col-md-4 col-lg-3"><div class="skeleton skeleton-card"></div></div>
            <div class="col-6 col-md-4 col-lg-3"><div class="skeleton skeleton-card"></div></div>
          </div>

          <!-- PAGINATION -->
          <div class="nc-pag">
          </div>
        </div>
      </div>
    </div>
  </section>
  
  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/products.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shop · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div id="nc-navbar"></div>

  <div class="container-nc nc-crumb"><a href="home.html">Home</a><span class="sep">/</span>Shop</div>
  <section class="pb-5">
    <div class="container-nc ">
      <div class="row g-4">
        <div class="col-lg-3">
          <div class="nc-filter">
            <div class="grp reveal">
              <h6>Category</h6>
              <label class="nc-check"><input type="checkbox" checked> Audio (142)</label>
              <label class="nc-check"><input type="checkbox"> Wearables (98)</label>
              <label class="nc-check"><input type="checkbox"> Cameras (76)</label>
              <label class="nc-check"><input type="checkbox"> Computers (210)</label>
              <label class="nc-check"><input type="checkbox"> Gaming (154)</label>
            </div>
            <div class="grp reveal">
              <h6>Brand</h6>
              <label class="nc-check"><input type="checkbox"> Sonicwave</label>
              <label class="nc-check"><input type="checkbox"> Chronos</label>
              <label class="nc-check"><input type="checkbox"> Lensix</label>
              <label class="nc-check"><input type="checkbox"> Keytron</label>
              <label class="nc-check"><input type="checkbox"> Playtron</label>
            </div>
            <div class="grp reveal">
              <h6>Price</h6>
              <input type="range" min="0" max="1000" value="500" class="nc-price-range">
              <div class="d-flex justify-content-between text-muted-nc mt-2" style="font-size:12px">
                <span>$0</span><span>$1000</span>
              </div>
            </div>
            <div class="grp reveal">
              <h6>Rating</h6>
              <label class="nc-check"><input type="checkbox"> ★★★★★ &amp; up</label>
              <label class="nc-check"><input type="checkbox"> ★★★★ &amp; up</label>
              <label class="nc-check"><input type="checkbox"> ★★★ &amp; up</label>
            </div>
            <div class="grp reveal">
              <h6>Discount</h6>
              <label class="nc-check"><input type="checkbox"> 10% or more</label>
              <label class="nc-check"><input type="checkbox"> 25% or more</label>
              <label class="nc-check"><input type="checkbox"> 50% or more</label>
            </div>
          </div>
        </div>
        <div class="col-lg-9 reveal">
          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <div class="text-muted-nc" style="font-size:14px">Showing <b class="">12 of 320</b> products</div>
            <div class="d-flex gap-2 align-items-center">
              <span class="text-muted-nc" style="font-size:13px">Sort by:</span>
              <select class="nc-input" style="width:auto">
                <option>Popularity</option>
                <option>Newest</option>
                <option>Price ↑</option>
                <option>Price ↓</option>
                <option>Rating</option>
              </select>
            </div>
          </div>
          <div class="mb-3 d-flex gap-2 flex-wrap"><span class="btn-nc-ghost"
              style="padding:6px 12px;font-size:12px">Audio ✕</span><span class="btn-nc-ghost"
              style="padding:6px 12px;font-size:12px">Under $200 ✕</span></div>
          <div class="row g-3" id="pgrid"></div>
          <div class="nc-pag"><a>‹</a><a class="active">1</a><a>2</a><a>3</a><a>…</a><a>12</a><a>›</a></div>
        </div>
      </div>
    </div>
  </section>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const c = document.getElementById('pgrid');
      if (c) c.innerHTML = NovaCart.products.map(p =>
        `<div class="col-6 col-md-4 col-lg-3">${productCard(p)}</div>`)
        .join('');

        const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("active");
          }
        });
      }, {
        threshold: 0.15
      });

      document.querySelectorAll(".reveal").forEach(el => {
        observer.observe(el);
      });
    });
  </script>
  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>

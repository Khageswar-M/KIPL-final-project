<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Product · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
    <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div id="nc-navbar"></div>

  <div class="container-nc nc-crumb">
    <a href="home.html">Home</a>
    <span class="sep">/</span>
    <a href="products.html">Shop</a>
    <span class="sep">/</span>
    Audio
    <span class="sep">/</span>
    Aurora Wireless Headphones
  </div>
  <section class="pb-5">
    <div class="container-nc">
      <div class="row g-5">
        <div class="col-lg-6">
          <div class="pd-gallery" id="mainImg"></div>
          <div class="pd-thumbs" id="thumbContainer"></div>
        </div>
        <div class="col-lg-6">
          <div id="brand" class=" text-muted-nc"
            style="text-transform:uppercase;letter-spacing:2px;font-size:12px;font-weight:700">Sonicwave</div>
          <h1 id="title" class="">Aurora Wireless Headphones — ANC</h1>
          <div id="" class=" rating d-flex align-items-center gap-2 mb-3">
            <span style="color:var(--nc-yellow)">★</span>
            <span id="" class="text-muted-nc" style="font-size:14px">4.8 · 1,204 reviews</span>
            <span class="ms-2" style="color:var(--nc-accent);font-size:13px">● In Stock</span>
          </div>
          <div id="price" class="pd-price">$129<small>$189</small><span class="save">Save 32%</span></div>
          <div class="mb-3">
            <label class="nc-label">Category</label>
            <label id="categoryName" class="nc-label text-muted fs-3">Category</label>
          </div>
          <div class="d-flex align-items-center gap-3 mb-3">
            <label class="nc-label mb-0">Quantity</label>
            <div class="nc-qty">
              <input type="number" id="quantityInput" value="1">
            </div>
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <button id="addToCartBtn" class="btn-nc">
              <i class="fa-solid fa-cart-shopping me-2"></i>
              Add to Cart
            </button>

            <button id="buyNowBtn" class="btn-nc-outline">
              Buy Now
            </button>

            
          </div>
          <div class="row g-2 mt-4">
            <div class="col-6">
              <div class="p-3 bg-surface-2 rounded-nc border-nc"><small class="text-muted-nc">Delivery</small>
                <div>Free · 2-day</div>
              </div>
            </div>
            <div class="col-6">
              <div class="p-3 bg-surface-2 rounded-nc border-nc"><small class="text-muted-nc">Return</small>
                <div id="return">30-day easy</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row mt-5 g-4">
        <div class="col-lg-8">
          <h4>Description</h4>
          <p id="description" class="text-muted-nc"></p>

          <h5 class="mt-4">Customer Reviews</h5>
          <div id="reviewContainer"></div>

        </div>
        <div class="col-lg-4">
          <div id="" class=" rating p-4 bg-surface rounded-nc border-nc"> </div>
        </div>
      </div>

      <div class="nc-section-head mt-5">
        <h2>Similar Products</h2>
      </div>
      <div class="row g-3" id="pgrid"></div>
    </div>
  </section>

  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/productdetails.js"></script>
</body>

</html>

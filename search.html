<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Search · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div id="nc-navbar"></div>

  <section class="py-5">
    <div class="container-nc">
      <form class="nc-search reveal" style="max-width:720px;margin:0 auto"><input
          placeholder="Search products, brands..." value="wireless headphones"><button>Search</button></form>
      <div class="row g-4 mt-4">
        <div class="col-lg-3">
          <div class="nc-filter reveal">
            <h6>Recent Searches</h6>
            <div class="d-flex flex-wrap gap-2 mb-3">
              <span class="btn-nc-ghost" style="padding:5px 10px;font-size:12px">Headphones</span>
              <span class="btn-nc-ghost" style="padding:5px 10px;font-size:12px">Watch</span>
              <span class="btn-nc-ghost" style="padding:5px 10px;font-size:12px">Keyboard</span>
            </div>
            <h6>Trending</h6>
            <div class="d-flex flex-wrap gap-2">
              <span class="btn-nc-ghost" style="padding:5px 10px;font-size:12px">🔥 4K Cam</span>
              <span class="btn-nc-ghost" style="padding:5px 10px;font-size:12px">🔥 VR</span>
              <span class="btn-nc-ghost" style="padding:5px 10px;font-size:12px">🔥 Console</span>
            </div>
          </div>
        </div>
        <div class="col-lg-9 reveal">
          <div class="text-muted-nc mb-3" style="font-size:14px">About <b class="">248</b> results for "<b
              class="">wireless headphones</b>"</div>
          <div class="row g-3" id="pgrid"></div>
        </div>
      </div>
    </div>
  </section>
  <script>
    document.addEventListener('DOMContentLoaded', () => { 
      const c = document.getElementById('pgrid'); 
      if (c) c.innerHTML = NovaCart.products.map(p => 
        `<div class="col-6 col-md-4 col-lg-3">
          ${productCard(p)}
        </div>`
      ).join(''); 

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("active");
          }
        });
      }, {
        threshold: 0.15
      });

      document.querySelectorAll(".reveal").forEach(el => {
        observer.observe(el);
      });
    });
  </script>
  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>

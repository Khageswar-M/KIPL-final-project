<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Payment · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
    <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div id="nc-navbar"></div>

  <div class="container-nc pt-4">
    <div class="nc-steps">
      <div class="st active">
        <div class="n">1</div>Cart
      </div>
      <div class="line"></div>
      <div class="st active">
        <div class="n">2</div>Address
      </div>
      <div class="line"></div>
      <div class="st active">
        <div class="n">3</div>Payment
      </div>
      <div class="line"></div>
      <div class="st ">
        <div class="n">4</div>Done
      </div>
    </div>
  </div>
  <section class="pb-5">
    <div class="container-nc">
      <div class="row g-4">
        <div class="col-lg-8">
          <div class="p-4 bg-surface rounded-nc border-nc">
            <h5>Payment Method</h5>
            <div class="nc-tabs mt-3" role="tablist">
              <a class="active" data-tab="card">
                <i class="fa-regular fa-credit-card"></i> Card
              </a>

              <a data-tab="upi">
                <i class="fa-solid fa-qrcode"></i> UPI
              </a>

              <a data-tab="wallet">
                <i class="fa-solid fa-wallet"></i> Wallet
              </a>

              <a data-tab="net">
                <i class="fa-solid fa-building-columns"></i> Net Banking
              </a>

              <a data-tab="cod">
                <i class="fa-solid fa-box"></i> Cash on Delivery
              </a>
            </div>
            <div id="pane-card" class="pane mt-4">
              <div class="row g-3">

                <div class="col-12">
                  <label class="nc-label">Card Number</label>
                  <input id="cardNumber" class="nc-input" type="text" maxlength="19" placeholder="1234 5678 9012 3456">
                </div>

                <div class="col-md-6">
                  <label class="nc-label">Cardholder</label>
                  <input id="cardHolder" class="nc-input" type="text" placeholder="Jane Doe">
                </div>

                <div class="col-md-3">
                  <label class="nc-label">Expiry</label>
                  <input id="expiry" class="nc-input" type="text" maxlength="5" placeholder="MM/YY">
                </div>

                <div class="col-md-3">
                  <label class="nc-label">CVV</label>
                  <input id="cvv" class="nc-input" type="password" maxlength="4" placeholder="•••">
                </div>

              </div>
              <div class="col-12 mt-2">
                <button type="button" id="saveCardBtn" class="btn-nc-ghost">💾 Save Card</button>
                <span id="savedCardInfo" class="text-muted-nc ms-2" style="font-size:13px"></span>
              </div>
            </div>

            <div id="pane-upi" class="pane mt-4 d-none">
              <label class="nc-label">UPI ID</label>
              <div class="d-flex gap-2">
                <input id="upiInput" class="nc-input" placeholder="you@bank">
                <button type="button" id="saveUpiBtn" class="btn-nc-ghost">Add UPI</button>
              </div>
              <div id="upiList" class="mt-3"></div>
            </div>
            <div id="pane-wallet" class="pane mt-4 d-none">
              <div class="row g-2">
                <div class="col-4">
                  <div class="nc-brand">Paytm</div>
                </div>
                <div class="col-4">
                  <div class="nc-brand">GPay</div>
                </div>
                <div class="col-4">
                  <div class="nc-brand">Apple Pay</div>
                </div>
              </div>
            </div>
            <div id="pane-net" class="pane mt-4 d-none"><select class="nc-input">
                <option>Select Bank</option>
                <option>Chase</option>
                <option>HDFC</option>
                <option>SBI</option>
              </select></div>
            <div id="pane-cod" class="pane mt-4 d-none">
              <p class="text-muted-nc">Pay when your order arrives at your doorstep.</p>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="nc-summary">
            <h5>Order Summary</h5>
            <div class="row">
              <span>Subtotal</span>
              <span class=" ms-auto" id="subtotalAmount">
                ₹00.00
              </span>
            </div>

            <div class="row">
              <span>Shipping</span>
              <span class=" ms-auto" id="shippingCharge">Free</span>
            </div>

            <div class="row">
              <span>Tax</span>
              <span class=" ms-auto" id="taxAmount">
                ₹00.00
              </span>
            </div>

            <div class="row">
              <span>Discount</span>
              <span style="color:var(--nc-accent)" class="ms-auto" id="discountAmount">₹00.00
              </span>
            </div>
            <div class="row">
              <span>Delivery</span>
              <span style="color:var(--nc-accent)" class="ms-auto" id="deliveryCharge">₹00.00
              </span>
            </div>

            <div class="row total">
              <span>Total</span>
              <span class="ms-auto" id="totalAmount">₹00.00</span>
            </div>
            <button type="button" id="payBtn" class="btn-nc w-100 justify-content-center mt-3">Continue to Payment →</button>
          </div>
        </div>
      </div>
    </div>
  </section>


  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/checkout.js"></script>
  <script src="js/payment.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Edit profile · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
    <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div id="nc-navbar"></div>

  <section class="py-5">
    <div class="container-nc">
      <div class="row g-4">
        <div class="col-lg-3">
          <div class="nc-side-nav">
            <a href="profile.html">
              <i class="fa-solid fa-user me-2"></i>Profile
            </a>

            <a href="edit-profile.html" class="active">
              <i class="fa-solid fa-pen-to-square me-2"></i>Edit Profile
            </a>

            <a href="orders.html">
              <i class="fa-solid fa-box me-2"></i>My Orders
            </a>



            <a href="address.html">
              <i class="fa-solid fa-location-dot me-2"></i>Addresses
            </a>

            <a href="notifications.html">
              <i class="fa-solid fa-bell me-2"></i>Notifications
            </a>

            <a href="support.html">
              <i class="fa-solid fa-comments me-2"></i>Support
            </a>
          </div>
        </div>

        <div class="col-lg-9">
          <div class="p-4 bg-surface rounded-nc border-nc">
            <h4>Edit Profile</h4>
            <div class="d-flex align-items-center gap-3 my-4">
              <div id="nc-avatar-preview"
                style="width:80px;height:80px;background:var(--nc-gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#fff;overflow:hidden">
                JD</div>
              <div><input type="file" id="nc-avatar-input" class="nc-input" accept="image/*"><small
                  class="text-muted-nc">JPG/PNG · Max 2MB</small></div>
            </div>
            <form id="nc-edit-form" class="row g-3">
              <div class="col-md-6"><label class="nc-label">Full name</label><input id="nc-fullname" class="nc-input"
                  value="Jane Doe"></div>
              <div class="col-md-6"><label class="nc-label">Phone</label><input id="nc-phone" type="tel"
                  class="nc-input" maxlength="10" value="9876543210"
                  oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)"></div>
              <div class="col-md-3"><label class="nc-label">Gender</label><select id="nc-gender" class="nc-input">
                  <option>Female</option>
                  <option>Male</option>
                  <option>Other</option>
                </select></div>
              <div class="col-md-3"><label class="nc-label">DOB</label><input id="nc-dob" type="date"
                  class="nc-input" value="1995-06-14"></div>
              <div class="col-12 d-flex gap-2 mt-2"><button type="submit" class="btn-nc">Save Changes</button><a
                  href="profile.html" class="btn-nc-outline">Cancel</a></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="nc-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      var STORAGE_KEYS = ["novacart_user", "ncUser", "user"];

      var fallback = {
        fullName: "Jane Doe",
        phone: "9876543210",
        gender: "Female",
        dob: "1995-06-14",
        profilePic: "",
        createdAt: new Date().toISOString()
      };

      function findUserKey() {
        for (var i = 0; i < STORAGE_KEYS.length; i++) {
          if (localStorage.getItem(STORAGE_KEYS[i])) return STORAGE_KEYS[i];
        }
        return null;
      }

      function loadUser() {
        var key = findUserKey();
        if (!key) return null;
        try {
          return JSON.parse(localStorage.getItem(key));
        } catch (e) {
          return null;
        }
      }

      function initials(name) {
        return (name || "")
          .split(" ")
          .filter(Boolean)
          .map(function (w) { return w[0].toUpperCase(); })
          .slice(0, 2)
          .join("") || "U";
      }

      function renderAvatar(pic, name) {
        var el = document.getElementById("nc-avatar-preview");
        if (pic) {
          el.innerHTML = '<img src="' + pic + '" alt="' + name +
            '" style="width:100%;height:100%;object-fit:cover">';
        } else {
          el.textContent = initials(name);
        }
      }

      var stored = loadUser() || {};
      var data = Object.assign({}, fallback, stored);
      var currentProfilePic = data.profilePic;

      renderAvatar(data.profilePic, data.fullName);
      document.getElementById("nc-fullname").value = data.fullName;
      document.getElementById("nc-phone").value = data.phone;
      document.getElementById("nc-gender").value = data.gender;
      document.getElementById("nc-dob").value = data.dob;

      // Live preview when a new photo is picked (kept in memory until Save)
      document.getElementById("nc-avatar-input").addEventListener("change", function (e) {
        var file = e.target.files && e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
          if (window.ncToast) ncToast("Image must be under 2MB");
          e.target.value = "";
          return;
        }
        var reader = new FileReader();
        reader.onload = function (ev) {
          currentProfilePic = ev.target.result;
          renderAvatar(currentProfilePic, document.getElementById("nc-fullname").value);
        };
        reader.readAsDataURL(file);
      });

      document.getElementById("nc-edit-form").addEventListener("submit", function (e) {
        e.preventDefault();

        var updated = Object.assign({}, stored, {
          fullName: document.getElementById("nc-fullname").value.trim(),
          phone: document.getElementById("nc-phone").value.trim(),
          gender: document.getElementById("nc-gender").value,
          dob: document.getElementById("nc-dob").value,
          profilePic: currentProfilePic || ""
        });

        var key = findUserKey() || "user";
        localStorage.setItem(key, JSON.stringify(updated));

        if (window.ncToast) {
          ncToast("Profile updated");
        }
      });
    })();
  </script>
</body>

</html>

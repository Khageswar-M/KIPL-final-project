<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset password · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
    <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- <div id="nc-navbar"></div> -->
  <section class="nc-auth">
    <div class="nc-auth-card">
      <div class="nc-brand-logo d-flex align-items-center">
        <img src="./images/AppLogo.png" alt="NovaCart Logo" class="img-fluid"
          style="height:45px; width:auto; scale: 4;">
      </div>
      <h1>Reset your password</h1>
      <p class="sub">Enter your mobile number and set a new password.</p>
      <form id="resetForm">
        <label class="nc-label">Mobile number</label>
        <input id="phone" type="tel" class="nc-input" placeholder="Your phone number" maxlength="10"
          oninput="this.value=this.value.replace(/\D/g,'').slice(0,10)" required>

        <label class="nc-label mt-3">New password</label>
        <input id="pw" type="password" class="nc-input" placeholder="Create a strong password"
          autocomplete="new-password" required>
        <div class="mt-2" style="height:4px;background:var(--nc-surface-2);border-radius:2px;overflow:hidden">
          <div id="str" style="height:100%;width:0;transition:.2s;background:#e63946"></div>
        </div>
        <div id="pwHint" style="font-size:12px;margin-top:6px;color:var(--nc-text-muted,#888)">
          Use 8+ characters with uppercase, lowercase, a number and a symbol.
        </div>

        <label class="nc-label mt-3">Confirm password</label>
        <input id="confirmPassword" type="password" class="nc-input" placeholder="Confirm password" autocomplete="new-password" required>

        <button id="resetBtn" type="submit" class="btn-nc w-100 justify-content-center mt-3" disabled>Reset
          Password</button>
        <p class="text-center mt-4 mb-0 text-muted-nc" style="font-size:14px">Remembered it? <a href="login.html"
            class="text-primary-nc">Back to login</a></p>
      </form>
    </div>
  </section>
  <!-- <div id="nc-footer"></div> -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const phone = document.getElementById("phone");
      const password = document.getElementById("pw");
      const confirmPassword = document.getElementById("confirmPassword");
      const resetForm = document.getElementById("resetForm");
      const strBar = document.getElementById("str");
      const resetBtn = document.getElementById("resetBtn");

      let currentStrength = "weak"; // weak | medium | strong

      function evaluatePassword(pw) {
        let score = 0;
        if (pw.length >= 8) score++;
        if (/[a-z]/.test(pw)) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;

        if (pw.length < 8 || score <= 2) return { level: "weak", pct: 33, color: "#e63946" };
        if (score <= 4) return { level: "medium", pct: 66, color: "#f4a261" };
        return { level: "strong", pct: 100, color: "#2a9d5c" };
      }

      password.addEventListener("input", () => {
        const { level, pct, color } = evaluatePassword(password.value);
        currentStrength = level;
        strBar.style.width = pct + "%";
        strBar.style.background = color;
        resetBtn.disabled = level !== "strong";
      });

      resetForm.addEventListener("submit", (e) => {
        e.preventDefault();

        if (!resetForm.checkValidity()) {
          resetForm.reportValidity();
          return;
        }

        let user = JSON.parse(localStorage.getItem("user") || "null");

        if (!user || (user.phone || "").trim() !== phone.value.trim()) {
          ncToast("No account found with that mobile number");
          return;
        }

        if (currentStrength !== "strong") {
          ncToast("Please create a stronger password before continuing");
          return;
        }

        if (password.value !== confirmPassword.value) {
          ncToast("Passwords do not match");
          return;
        }

        user.password = password.value.trim();
        localStorage.setItem("user", JSON.stringify(user));

        ncToast("Password updated successfully!");

        setTimeout(() => {
          location.href = "login.html";
        }, 800);
      });

    });
  </script>
</body>

</html>

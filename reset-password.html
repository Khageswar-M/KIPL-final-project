<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset password · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
    <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- <div id="nc-navbar"></div> -->
  <section class="nc-auth">
    <div class="nc-auth-card">
      <div class="nc-brand-logo d-flex align-items-center">
        <img src="./images/AppLogo.png" alt="NovaCart Logo" class="img-fluid"
          style="height:45px; width:auto; scale: 4;">
      </div>
      <h1>Set a new password</h1>
      <p class="sub">Make it strong and memorable.</p>
      <form
        onsubmit="event.preventDefault();ncToast('Password updated');setTimeout(()=>location.href='login.html',800)">
        <label class="nc-label">New password</label>
        <input id="pw" type="password" minlength="6" maxlength="16" class="nc-input" required>
        <div class="mt-2" style="height:4px;background:var(--nc-surface-2);border-radius:2px;overflow:hidden">
          <div id="str" style="height:100%;width:0;transition:.2s"></div>
        </div>
        <label class="nc-label mt-3">Confirm password</label>
        <input id="confirmPassword" type="password" class="nc-input" minlength="6" maxlength="16" required>
        <button id="resetBtn" class="btn-nc w-100 justify-content-center mt-3">Reset Password</button>
      </form>
    </div>
  </section>
  <!-- <div id="nc-footer"></div> -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const password = document.getElementById("pw");
      const confirmPassword = document.getElementById("confirmPassword");
      const resetBtn = document.getElementById("resetBtn");

      let user = JSON.parse(localStorage.getItem("user"));

      resetBtn.addEventListener("click", () => {

        if (!user) {
          ncToast("User not found");
          return;
        }

        if (!password.checkValidity() || !confirmPassword.checkValidity()) {
          password.reportValidity();
          confirmPassword.reportValidity();
          return;
        }

        if (password.value !== confirmPassword.value) {
          ncToast("Passwords do not match");
          return;
        }

        user.password = password.value.trim();

        localStorage.setItem("user", JSON.stringify(user));

        ncToast("Password updated successfully!");

        setTimeout(() => {
          location.href = "login.html";
        }, 800);

      });

    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>

</html>

<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot password · NovaCart</title>
  <meta name="description"
    content="NovaCart — the next-generation ecommerce experience for gadgets, fashion and lifestyle.">
  <link rel="shortcut icon" href="./images/NovaCartFevIcon.png" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- <div id="nc-navbar"></div> -->
  <section class="nc-auth">
    <div class="nc-auth-card">
      <div class="nc-brand-logo d-flex align-items-center">
        <img src="./images/AppLogo.png" alt="NovaCart Logo" class="img-fluid"
          style="height:45px; width:auto; scale: 4;">
      </div>
      <h1>Forgot password?</h1>
      <p class="sub">Enter your email and we'll send you a one-time code.</p>
      <form id="forgotForm" novalidate>
        <label class="nc-label">Email</label>
        <input id="email" type="email" class="nc-input" placeholder="you@email.com" required>
        <button id="sendBtn" type="submit" class="btn-nc w-100 justify-content-center mt-3">Send OTP</button>
        <p class="text-center mt-4 mb-0"><a href="login.html" class="text-primary-nc" style="font-size:14px">← Back to
            login</a></p>
      </form>
    </div>
  </section>
  <!-- <div id="nc-footer"></div> -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById("forgotForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const emailInput = document.getElementById("email");

      if (!emailInput.checkValidity()) {
        emailInput.reportValidity();
        return;
      }

      const email = emailInput.value.trim().toLowerCase();
      const user = JSON.parse(localStorage.getItem("user") || "null");

      if (!user || (user.email || "").trim().toLowerCase() !== email) {
        ncToast("No account found with that email");
        return;
      }

      // Hand off the verified email to the OTP + reset steps.
      sessionStorage.setItem("nc_reset_email", email);
      sessionStorage.setItem("nc_reset_verified", "false");

      ncToast("OTP sent to your email");
      setTimeout(() => { location.href = "verify-otp.html"; }, 500);
    });
  </script>
</body>

</html>
